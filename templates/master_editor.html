<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>マスタデータ管理エディタ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .tab-btn.active { border-bottom: 2px solid #3b82f6; color: #3b82f6; }
    </style>
</head>
<body class="bg-gray-100 h-screen flex flex-col">
    <header class="bg-gray-800 text-white p-4 flex justify-between items-center shadow-md">
        <h1 class="text-xl font-bold">マスタデータ管理エディタ</h1>
        <div class="flex space-x-3 items-center">
            <input type="file" id="csv-upload" accept=".csv" class="hidden" />
            <button id="btn-import-csv" class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded font-bold shadow transition flex items-center">
                <svg class="w-5 h-5 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                CSVインポート
            </button>
            <button id="btn-save-masters" class="bg-green-500 hover:bg-green-600 text-white px-6 py-2 rounded font-bold shadow transition">全マスタ保存</button>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden">
        <div class="w-48 bg-white border-r flex flex-col">
            <button class="tab-btn active p-4 text-left hover:bg-gray-50 font-bold" data-target="release">リリース</button>
            <button class="tab-btn p-4 text-left hover:bg-gray-50 font-bold" data-target="character">キャラクター</button>
            <button class="tab-btn p-4 text-left hover:bg-gray-50 font-bold" data-target="section">セクション</button>
            <button class="tab-btn p-4 text-left hover:bg-gray-50 font-bold" data-target="member">メンバー</button>
            <button class="tab-btn p-4 text-left hover:bg-gray-50 font-bold" data-target="status">ステータス</button>
            <button class="tab-btn p-4 text-left hover:bg-gray-50 font-bold" data-target="task_template">タスク雛形</button>
            <button class="tab-btn p-4 text-left hover:bg-gray-50 font-bold" data-target="holiday">休日</button>
        </div>
        <div class="flex-1 p-4 overflow-auto bg-white" id="editor-container">
            <!-- Table dynamically injected here -->
        </div>
    </div>

    <script>
        let mastersData = {};
        const schemas = {
            release: ['release_id', 'release_name', 'art_deadline', 'branch_deadline', 'release_date', 'event_name'],
            character: ['char_id', 'char_name', 'costume_name', 'category', 'usage', 'event_id'],
            section: ['section_id', 'section_name', 'color'],
            member: ['member_id', 'member_name', 'display_name', 'section_id', 'bg_color', 'text_color'],
            status: ['status_id', 'status_name', 'color'],
            task_template: ['template_id', 'section_id', 'task_name', 'default_days'],
            holiday: ['holiday_date', 'holiday_name', 'holiday_type']
        };

        let currentTab = 'release';
        
        // get project name from query param
        const urlParams = new URLSearchParams(window.location.search);
        const projectName = urlParams.get('project') || 'Sample';

        async function loadMasters() {
            const res = await fetch(`/api/masters?project=${projectName}`);
            mastersData = await res.json();
            renderTable();
        }

        function renderTable() {
            const container = document.getElementById('editor-container');
            container.innerHTML = '';
            
            const schema = schemas[currentTab];
            const data = mastersData[currentTab] || [];

            const table = document.createElement('table');
            table.className = 'min-w-full bg-white border';
            
            // Header
            const thead = document.createElement('thead');
            const trHead = document.createElement('tr');
            const thDrag = document.createElement('th');
            thDrag.className = 'py-2 px-2 border-b bg-gray-100 text-center w-10';
            thDrag.textContent = '並替';
            trHead.appendChild(thDrag);
            schema.forEach(col => {
                const th = document.createElement('th');
                th.className = 'py-2 px-4 border-b bg-gray-100 text-left text-sm font-bold text-gray-600';
                th.textContent = col;
                trHead.appendChild(th);
            });
            const thAction = document.createElement('th');
            thAction.className = 'py-2 px-4 border-b bg-gray-100 text-left';
            thAction.textContent = '操作';
            trHead.appendChild(thAction);
            thead.appendChild(trHead);
            table.appendChild(thead);

            // Body
            const tbody = document.createElement('tbody');
            let draggedIndex = -1;

            data.forEach((row, index) => {
                const tr = document.createElement('tr');
                tr.draggable = true;
                tr.dataset.index = index;
                
                const tdDrag = document.createElement('td');
                tdDrag.className = 'py-1 px-2 border-b text-center text-gray-400 cursor-grab hover:text-gray-600';
                tdDrag.innerHTML = '≡';
                tr.appendChild(tdDrag);

                tr.addEventListener('dragstart', (e) => {
                    draggedIndex = index;
                    e.dataTransfer.effectAllowed = 'move';
                    setTimeout(() => tr.classList.add('opacity-50'), 0);
                });

                tr.addEventListener('dragover', (e) => {
                    e.preventDefault();
                    e.dataTransfer.dropEffect = 'move';
                    tr.classList.add('bg-blue-50');
                });

                tr.addEventListener('dragleave', () => {
                    tr.classList.remove('bg-blue-50');
                });

                tr.addEventListener('drop', (e) => {
                    e.preventDefault();
                    tr.classList.remove('bg-blue-50');
                    if (draggedIndex === -1 || draggedIndex === index) return;
                    
                    const targetIndex = index;
                    const items = mastersData[currentTab];
                    const item = items.splice(draggedIndex, 1)[0];
                    items.splice(targetIndex, 0, item);
                    
                    renderTable();
                });

                tr.addEventListener('dragend', () => {
                    tr.classList.remove('opacity-50');
                    draggedIndex = -1;
                });

                schema.forEach(col => {
                    const td = document.createElement('td');
                    td.className = 'py-1 px-2 border-b';
                    const input = document.createElement('input');
                    if (col.includes('color')) {
                        input.type = 'color';
                    } else if (col.includes('date') || col.includes('deadline')) {
                        input.type = 'date';
                    } else {
                        input.type = 'text';
                    }
                    input.value = row[col] || '';
                    input.className = 'w-full border p-1 rounded';
                    input.onchange = (e) => {
                        mastersData[currentTab][index][col] = e.target.value;
                    };
                    td.appendChild(input);
                    tr.appendChild(td);
                });
                
                const tdAction = document.createElement('td');
                tdAction.className = 'py-1 px-2 border-b';
                const delBtn = document.createElement('button');
                delBtn.textContent = '削除';
                delBtn.className = 'bg-red-500 hover:bg-red-600 text-white px-3 py-1 rounded text-xs font-bold';
                delBtn.onclick = () => {
                    mastersData[currentTab].splice(index, 1);
                    renderTable();
                };
                tdAction.appendChild(delBtn);
                tr.appendChild(tdAction);

                tbody.appendChild(tr);
            });
            table.appendChild(tbody);
            container.appendChild(table);

            const addBtn = document.createElement('button');
            addBtn.textContent = '+ 行を追加';
            addBtn.className = 'mt-4 bg-blue-500 text-white px-4 py-2 rounded';
            addBtn.onclick = () => {
                const newRow = {};
                schema.forEach(col => newRow[col] = '');
                mastersData[currentTab].push(newRow);
                renderTable();
            };
            container.appendChild(addBtn);
        }

        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                currentTab = e.target.dataset.target;
                renderTable();
            });
        });

        function parseCSV(csvText) {
            const lines = csvText.split(/\r?\n/).filter(line => line.trim() !== '');
            if (lines.length < 2) return [];
            
            const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g, ''));
            
            const result = [];
            for (let i = 1; i < lines.length; i++) {
                const values = [];
                let inQuote = false;
                let currentValue = '';
                const line = lines[i];
                
                for (let j = 0; j < line.length; j++) {
                    const char = line[j];
                    if (char === '"') {
                        inQuote = !inQuote;
                    } else if (char === ',' && !inQuote) {
                        values.push(currentValue);
                        currentValue = '';
                    } else {
                        currentValue += char;
                    }
                }
                values.push(currentValue);
                
                const row = {};
                headers.forEach((header, index) => {
                    row[header] = values[index] !== undefined ? values[index].trim().replace(/^"|"$/g, '') : '';
                });
                result.push(row);
            }
            return result;
        }

        document.getElementById('btn-import-csv').addEventListener('click', () => {
            document.getElementById('csv-upload').click();
        });

        document.getElementById('csv-upload').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (event) => {
                let text = event.target.result;
                
                if (text.charCodeAt(0) === 0xFEFF) {
                    text = text.slice(1);
                }

                try {
                    const parsedData = parseCSV(text);
                    
                    if (parsedData.length > 0) {
                        const schema = schemas[currentTab];
                        const newMasterData = [];
                        
                        parsedData.forEach(row => {
                            const newRow = {};
                            schema.forEach(col => {
                                let val = row[col] !== undefined ? row[col] : '';
                                // 日付の変換 (YYYY/MM/DD -> YYYY-MM-DD)
                                if (val && (col.includes('date') || col.includes('deadline'))) {
                                    if (val.includes('/')) {
                                        const parts = val.split('/');
                                        if (parts.length === 3) {
                                            const y = parts[0];
                                            const m = parts[1].padStart(2, '0');
                                            const d = parts[2].padStart(2, '0');
                                            val = `${y}-${m}-${d}`;
                                        } else {
                                            val = val.replace(/\//g, '-');
                                        }
                                    }
                                }
                                newRow[col] = val;
                            });
                            newMasterData.push(newRow);
                        });

                        mastersData[currentTab] = newMasterData;
                        renderTable();
                        alert(`${currentTab} タブに ${newMasterData.length} 件のデータをインポートしました。\n※まだ保存されていません。「全マスタ保存」を押して確定してください。`);
                    } else {
                        alert('CSVファイルにデータがありません。');
                    }
                } catch (err) {
                    console.error(err);
                    alert('CSVの読み込みに失敗しました。フォーマットを確認してください。');
                }
                
                e.target.value = '';
            };
            
            reader.readAsText(file, 'utf-8');
        });

        document.getElementById('btn-save-masters').addEventListener('click', async () => {
            try {
                const res = await fetch(`/api/masters/save?project=${projectName}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(mastersData)
                });
                const result = await res.json();
                if(result.status === 'success') {
                    alert('マスタデータを保存しました。');
                } else {
                    alert('保存に失敗しました: ' + result.message);
                }
            } catch (err) {
                alert('エラーが発生しました');
            }
        });

        loadMasters();
    </script>
</body>
<script>
    setInterval(() => {
        fetch('/api/heartbeat', { method: 'POST' }).catch(() => {});
    }, 3000);
</script>
</html>
