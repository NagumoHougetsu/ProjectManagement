<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WBS Timeline Editor</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Moment.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.4/moment.min.js"></script>
    <!-- Custom CSS -->
    <script>
        const link = document.createElement('link');
        link.rel = 'stylesheet';
        link.href = "{{ url_for('static', filename='css/style.css') }}?v=" + new Date().getTime();
        document.head.appendChild(link);
    </script>
</head>
<body class="bg-gray-100 h-screen flex flex-col overflow-hidden text-sm">
    <!-- Header -->
    <header class="bg-blue-800 text-white p-4 flex justify-between items-center shadow-md z-30">
        <div class="flex items-center space-x-4">
            <h1 class="text-xl font-bold">次世代アートWBSツール (完全自作版)</h1>
            <div class="flex items-center space-x-2 ml-4">
                <label for="filter-section" class="font-bold">稼働Line表示:</label>
                <select id="filter-section" class="text-black px-2 py-1 rounded border">
                    <option value="">全セクション表示</option>
                </select>
            </div>
        </div>
        <div class="flex space-x-4">
            <span id="unsaved-badge" class="bg-red-500 text-white px-3 py-1 rounded hidden font-bold mt-1">未保存の変更あり</span>
            <button id="btn-undo" class="bg-gray-500 hover:bg-gray-600 text-white px-4 py-2 rounded transition disabled:opacity-50" disabled>取り消し</button>
            <button id="btn-redo" class="bg-gray-500 hover:bg-gray-600 text-white px-4 py-2 rounded transition disabled:opacity-50" disabled>やり直し</button>
            <a href="/master_editor" target="_blank" class="bg-gray-600 hover:bg-gray-500 text-white px-4 py-2 rounded transition" id="master-editor-link">マスタ管理</a>
            <button id="btn-save" class="bg-green-500 hover:bg-green-600 text-white px-6 py-2 rounded font-bold shadow transition">保存</button>
            <button id="btn-restart" class="bg-purple-600 hover:bg-purple-700 text-white px-4 py-2 rounded font-bold shadow transition">サーバー再起動</button>
        </div>
    </header>

    <!-- Project Tabs -->
    <div class="bg-gray-200 border-b flex items-end px-2 pt-2 space-x-1 overflow-x-auto select-none" id="project-tabs-container">
        <!-- Tabs injected by JS -->
    </div>

    <!-- Main Content -->
    <div class="flex flex-1 overflow-hidden relative">
        <!-- Gantt Container (完全自作) -->
        <div id="gantt-container" class="flex flex-1 overflow-hidden bg-white relative">
            
            <!-- 左側：ツリーラベルエリア（非表示だがDOMは維持しておくか、完全に消すか）-->
            <div id="gantt-left" class="hidden w-64 flex-shrink-0 border-r bg-white flex flex-col z-20 shadow-[2px_0_5px_-2px_rgba(0,0,0,0.1)] relative">
                <div id="gantt-left-header" class="h-16 border-b border-gray-300 bg-gray-100 flex items-center px-4 font-bold text-gray-700">タスク階層</div>
                <div id="gantt-left-body" class="flex-1 overflow-hidden relative bg-white">
                    <div id="gantt-left-content" class="absolute top-0 left-0 w-full transition-transform duration-75"></div>
                </div>
            </div>
            
            <!-- 右側：タイムラインエリア -->
            <div id="gantt-right" class="flex-1 flex flex-col relative bg-white overflow-hidden">
                <!-- タイムラインヘッダー（日付スケール＋稼働Line数） -->
                <div id="gantt-header" class="h-[120px] border-b border-gray-300 bg-gray-50 flex-shrink-0 overflow-hidden relative select-none">
                    <div id="gantt-header-content" class="absolute top-0 left-0 h-full min-w-full transition-transform duration-75"></div>
                </div>
                <!-- タイムラインボディ（スクロール領域） -->
                <div id="gantt-body" class="flex-1 overflow-auto relative select-none">
                    <div id="gantt-body-content" class="absolute top-0 left-0 min-h-full">
                        <!-- カレンダーの背景（休日色・罫線） -->
                        <div id="gantt-grid" class="absolute top-0 left-0 w-full h-full pointer-events-none"></div>
                        <!-- 行（レーン）の背景と区切り線 -->
                        <div id="gantt-rows" class="absolute top-0 left-0 w-full h-full pointer-events-none"></div>
                        <!-- タスクの配置コンテナ -->
                        <div id="gantt-tasks" class="absolute top-0 left-0 w-full h-full z-10"></div>
                        <!-- マウス追従ハイライト -->
                        <div id="gantt-crosshair-col" class="hidden absolute top-0 bottom-0 bg-blue-500/10 pointer-events-none z-10 border-l border-r border-blue-500/20"></div>
                        <div id="gantt-crosshair-row" class="hidden absolute left-0 right-0 bg-blue-500/10 pointer-events-none z-10 border-t border-b border-blue-500/20"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Side Panel Editor -->
        <div id="side-panel" class="w-80 bg-white border-l shadow-xl flex flex-col transform translate-x-full transition-transform duration-300 absolute right-0 top-0 h-full z-40">
            <div class="p-4 bg-gray-200 border-b flex justify-between items-center">
                <h2 id="editor-title" class="font-bold text-lg">タスク編集</h2>
                <button id="btn-close-panel" class="text-gray-500 hover:text-black text-xl">&times;</button>
            </div>
            <div class="p-4 flex-1 overflow-y-auto space-y-4">
                <input type="hidden" id="edit-task-id">
                <input type="hidden" id="edit-group-type">
                
                <div id="editor-field-release">
                    <label class="block font-bold mb-1">バージョン</label>
                    <select id="edit-release" class="w-full border rounded p-2"></select>
                </div>
                
                <div id="editor-field-event">
                    <label class="block font-bold mb-1">イベント</label>
                    <input type="text" id="edit-event" class="w-full border rounded p-2 bg-gray-100" readonly placeholder="マスタデータ参照">
                </div>

                <div id="editor-field-character">
                    <label class="block font-bold mb-1">キャラクター</label>
                    <select id="edit-character" class="w-full border rounded p-2"></select>
                </div>

                <div id="editor-field-section">
                    <label class="block font-bold mb-1">セクション</label>
                    <select id="edit-section" class="w-full border rounded p-2"></select>
                </div>

                <div id="editor-field-task-name">
                    <label class="block font-bold mb-1">タスク名 (雛形)</label>
                    <select id="edit-task-name" class="w-full border rounded p-2"></select>
                </div>

                <div id="editor-field-member">
                    <label class="block font-bold mb-1">担当者</label>
                    <select id="edit-member" class="w-full border rounded p-2"></select>
                </div>

                <div id="editor-field-dates" class="flex space-x-2">
                    <div class="flex-1">
                        <label class="block font-bold mb-1">開始日</label>
                        <input type="date" id="edit-start" class="w-full border rounded p-2">
                    </div>
                    <div class="flex-1">
                        <label class="block font-bold mb-1">終了日</label>
                        <input type="date" id="edit-end" class="w-full border rounded p-2">
                    </div>
                </div>

                <div id="editor-field-progress">
                    <label class="block font-bold mb-1">進捗率 (%)</label>
                    <input type="number" id="edit-progress" min="0" max="100" class="w-full border rounded p-2">
                </div>
            </div>
            <div class="p-4 bg-gray-100 border-t flex justify-end space-x-2">
                <button id="btn-delete-task" class="bg-red-500 text-white px-4 py-2 rounded hover:bg-red-600 hidden">削除</button>
                <button id="btn-apply-task" class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600">適用</button>
            </div>
        </div>
        
        <!-- New Project Dialog -->
        <div id="new-project-dialog" class="fixed inset-0 bg-black/50 hidden flex items-center justify-center z-[100]">
            <div class="bg-white rounded-lg shadow-xl p-6 w-96">
                <h2 class="text-lg font-bold mb-4">新規タブを開く</h2>
                <div class="mb-4">
                    <label class="block font-bold mb-1">既存のプロジェクトを選択</label>
                    <select id="new-tab-select" class="w-full border rounded p-2"></select>
                </div>
                <div class="flex items-center my-4">
                    <div class="flex-1 border-t border-gray-300"></div>
                    <span class="px-3 text-gray-500 font-bold">または</span>
                    <div class="flex-1 border-t border-gray-300"></div>
                </div>
                <div class="mb-6">
                    <label class="block font-bold mb-1">新しいプロジェクトを作成</label>
                    <input type="text" id="new-project-name" class="w-full border rounded p-2" placeholder="プロジェクト名を入力">
                </div>
                <div class="flex justify-end space-x-2">
                    <button class="px-4 py-2 bg-gray-300 hover:bg-gray-400 rounded" onclick="closeNewProjectDialog()">キャンセル</button>
                    <button class="px-4 py-2 bg-blue-500 hover:bg-blue-600 text-white rounded font-bold" onclick="applyNewProject()">開く / 作成</button>
                </div>
            </div>
        </div>

        <!-- Context Menu -->
        <div id="context-menu" class="absolute bg-white border shadow-lg rounded hidden z-50 py-1 w-40">
            <div class="relative group">
                <div class="px-4 py-2 hover:bg-gray-100 cursor-pointer font-bold text-gray-700 flex justify-between items-center">
                    <span>進捗変更</span><span>▶</span>
                </div>
                <!-- サブメニュー（Hoverで表示） -->
                <div class="absolute left-full top-0 hidden group-hover:block bg-white border shadow-lg rounded py-1 w-40 -ml-1">
                    <div class="px-4 py-2 hover:bg-blue-100 cursor-pointer context-progress" data-progress="0">0% (未着手)</div>
                    <div class="px-4 py-2 hover:bg-blue-100 cursor-pointer context-progress" data-progress="25">25%</div>
                    <div class="px-4 py-2 hover:bg-blue-100 cursor-pointer context-progress" data-progress="50">50%</div>
                    <div class="px-4 py-2 hover:bg-blue-100 cursor-pointer context-progress" data-progress="75">75%</div>
                    <div class="px-4 py-2 hover:bg-green-100 cursor-pointer context-progress" data-progress="100">100% (完了)</div>
                </div>
            </div>
            <div class="border-t my-1"></div>
            <div class="px-4 py-2 hover:bg-blue-100 cursor-pointer font-bold text-gray-700" id="ctx-copy">コピー (Ctrl+C)</div>
            <div class="px-4 py-2 hover:bg-blue-100 cursor-pointer font-bold text-gray-700" id="ctx-paste">ペースト (Ctrl+V)</div>
            <div class="border-t my-1"></div>
            <div class="px-4 py-2 hover:bg-red-100 cursor-pointer font-bold text-red-600" id="ctx-delete">削除 (Delete)</div>
        </div>
    </div>

    <!-- Main App Logic -->
    <script>
        const script = document.createElement('script');
        // 完全自作版のJS（app_v3.js）を読み込む
        script.src = "{{ url_for('static', filename='js/app_v3.js') }}?v=" + new Date().getTime();
        document.body.appendChild(script);
    </script>
</body>
</html>
