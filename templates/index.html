<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WBS Timeline Editor</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Moment.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.4/moment.min.js"></script>
    <!-- Vis.js Timeline CSS & JS -->
    <script type="text/javascript" src="https://unpkg.com/vis-timeline@latest/standalone/umd/vis-timeline-graph2d.min.js"></script>
    <link href="https://unpkg.com/vis-timeline@latest/styles/vis-timeline-graph2d.min.css" rel="stylesheet" type="text/css" />
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}?v={{ ts }}">
</head>
<body class="bg-gray-100 h-screen flex flex-col overflow-hidden">
    <!-- Header -->
    <header class="bg-blue-800 text-white p-4 flex justify-between items-center shadow-md z-10">
        <div class="flex items-center space-x-4">
            <h1 class="text-xl font-bold">次世代アートWBSツール (最新版 v10)</h1>
            <select id="project-select" class="text-black px-2 py-1 rounded border"></select>
            <div class="flex items-center space-x-2 ml-4">
                <label for="filter-section" class="text-sm font-bold">稼働Line表示:</label>
                <select id="filter-section" class="text-black px-2 py-1 rounded border">
                    <option value="">全セクション表示</option>
                </select>
            </div>
        </div>
        <div class="flex space-x-4">
            <span id="unsaved-badge" class="bg-red-500 text-white px-3 py-1 rounded hidden font-bold mt-1">未保存の変更あり</span>
            <button id="btn-undo" class="bg-gray-500 hover:bg-gray-600 text-white px-4 py-2 rounded transition disabled:opacity-50" disabled>取り消し</button>
            <button id="btn-redo" class="bg-gray-500 hover:bg-gray-600 text-white px-4 py-2 rounded transition disabled:opacity-50" disabled>やり直し</button>
            <a href="/master_editor" target="_blank" class="bg-gray-600 hover:bg-gray-500 text-white px-4 py-2 rounded transition">マスタ管理</a>
            <button id="btn-save" class="bg-green-500 hover:bg-green-600 text-white px-6 py-2 rounded font-bold shadow transition">保存</button>
        </div>
    </header>

    <!-- Main Content -->
    <div class="flex flex-1 overflow-hidden relative">
        <!-- Timeline Container -->
        <div id="visualization" class="flex-1 overflow-hidden bg-white"></div>

        <!-- Side Panel Editor -->
        <div id="side-panel" class="w-80 bg-white border-l shadow-xl flex flex-col transform translate-x-full transition-transform duration-300 absolute right-0 top-0 h-full z-20">
            <div class="p-4 bg-gray-200 border-b flex justify-between items-center">
                <h2 id="editor-title" class="font-bold text-lg">タスク編集</h2>
                <button id="btn-close-panel" class="text-gray-500 hover:text-black">&times;</button>
            </div>
            <div class="p-4 flex-1 overflow-y-auto space-y-4">
                <input type="hidden" id="edit-task-id">
                
                <div>
                    <label class="block text-sm font-bold mb-1">バージョン</label>
                    <select id="edit-release" class="w-full border rounded p-2"></select>
                </div>
                
                <div>
                    <label class="block text-sm font-bold mb-1">キャラクター</label>
                    <select id="edit-character" class="w-full border rounded p-2"></select>
                </div>

                <div>
                    <label class="block text-sm font-bold mb-1">セクション</label>
                    <select id="edit-section" class="w-full border rounded p-2"></select>
                </div>

                <div>
                    <label class="block text-sm font-bold mb-1">タスク名 (雛形)</label>
                    <select id="edit-task-name" class="w-full border rounded p-2"></select>
                </div>

                <div>
                    <label class="block text-sm font-bold mb-1">担当者</label>
                    <select id="edit-member" class="w-full border rounded p-2"></select>
                </div>

                <div class="flex space-x-2">
                    <div class="flex-1">
                        <label class="block text-sm font-bold mb-1">開始日</label>
                        <input type="date" id="edit-start" class="w-full border rounded p-2">
                    </div>
                    <div class="flex-1">
                        <label class="block text-sm font-bold mb-1">終了日</label>
                        <input type="date" id="edit-end" class="w-full border rounded p-2">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-bold mb-1">進捗率 (%)</label>
                    <input type="number" id="edit-progress" min="0" max="100" class="w-full border rounded p-2">
                </div>
            </div>
            <div class="p-4 bg-gray-100 border-t flex justify-end space-x-2">
                <button id="btn-delete-task" class="bg-red-500 text-white px-4 py-2 rounded hover:bg-red-600 hidden">削除</button>
                <button id="btn-apply-task" class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600">適用</button>
            </div>
        </div>
        
        <!-- Context Menu -->
        <div id="context-menu" class="absolute bg-white border shadow-lg rounded hidden z-50 py-1 w-40">
            <div class="relative group">
                <div class="px-4 py-2 hover:bg-gray-100 cursor-pointer text-sm font-bold text-gray-700 flex justify-between items-center">
                    <span>進捗変更</span><span>▶</span>
                </div>
                <!-- サブメニュー（Hoverで表示） -->
                <div class="absolute left-full top-0 hidden group-hover:block bg-white border shadow-lg rounded py-1 w-40 -ml-1">
                    <div class="px-4 py-2 hover:bg-blue-100 cursor-pointer text-sm context-progress" data-progress="0">0% (未着手)</div>
                    <div class="px-4 py-2 hover:bg-blue-100 cursor-pointer text-sm context-progress" data-progress="25">25%</div>
                    <div class="px-4 py-2 hover:bg-blue-100 cursor-pointer text-sm context-progress" data-progress="50">50%</div>
                    <div class="px-4 py-2 hover:bg-blue-100 cursor-pointer text-sm context-progress" data-progress="75">75%</div>
                    <div class="px-4 py-2 hover:bg-green-100 cursor-pointer text-sm context-progress" data-progress="100">100% (完了)</div>
                </div>
            </div>
            <div class="border-t my-1"></div>
            <div class="px-4 py-2 hover:bg-blue-100 cursor-pointer text-sm font-bold text-gray-700" id="ctx-copy">コピー (Ctrl+C)</div>
            <div class="px-4 py-2 hover:bg-blue-100 cursor-pointer text-sm font-bold text-gray-700" id="ctx-paste">ペースト (Ctrl+V)</div>
            <div class="border-t my-1"></div>
            <div class="px-4 py-2 hover:bg-red-100 cursor-pointer text-sm font-bold text-red-600" id="ctx-delete">削除 (Delete)</div>
        </div>
    </div>

    <!-- Main App Logic -->
    <script src="{{ url_for('static', filename='js/app.js') }}?v={{ ts }}"></script>
</body>
</html>
